<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Iceberg Tier List</title>
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #111827;
  --bg3: #1a2236;
  --surface: #1e2d45;
  --surface2: #243452;
  --border: rgba(100,160,255,.18);
  --border2: rgba(100,160,255,.34);
  --text: #e8eef8;
  --text2: #9fb0c8;
  --text3: #64748f;
  --accent: #4a9eff;
  --accent2: #2563eb;
  --danger: #f87171;
  --remove: #ffe76a;
  --font: Georgia, serif;
  --mono: "Courier New", monospace;
  --header-h: 66px;
  --sidebar-w: 270px;
  --detail-w: 330px;
  --canvas-w: 980px;
  --canvas-h: 1752px;
  --label-w: 185px;
  --entry-size: 14px;
}

* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; overflow: hidden; }
body { font-family: var(--font); background: var(--bg); color: var(--text); }

button, input, textarea { font: inherit; }
button { cursor: pointer; }

header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 20;
  height: var(--header-h);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 18px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}

.logo { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 700; }
.logo svg { width: 28px; height: 28px; flex: 0 0 auto; }
.title-area { flex: 1 1 auto; min-width: 180px; }
#chart-title {
  width: 100%;
  padding: 4px 0;
  color: #fff;
  background: transparent;
  border: 0;
  border-bottom: 1px solid var(--border);
  outline: 0;
  font-size: 18px;
  font-weight: 900;
  text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 3px 4px rgba(0,0,0,.9);
}
#chart-title:focus { border-bottom-color: var(--accent); }
.header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
#file-input { display: none; }

.btn {
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  white-space: nowrap;
  transition: background .15s, border-color .15s, color .15s;
}
.btn:hover { background: var(--surface2); border-color: var(--border2); }
.btn.primary { background: var(--accent2); border-color: var(--accent); color: #fff; }
.btn.primary:hover { background: #1d4ed8; }
.btn.danger { background: #3b1a1a; border-color: #7f2222; color: var(--danger); }
.btn.danger:hover { background: #4a2020; }
.btn.remove { background: #3a310d; border-color: #a8871a; color: var(--remove); }
.btn.remove:hover { background: #4a3f11; border-color: #d6ad24; }

.layout {
  display: flex;
  height: calc(100vh - var(--header-h));
  margin-top: var(--header-h);
  overflow: hidden;
}

.sidebar {
  flex: 0 0 var(--sidebar-w);
  width: var(--sidebar-w);
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 16px;
  overflow: hidden;
  background: var(--bg2);
  border-right: 1px solid var(--border);
}
.sidebar h3 {
  margin: 0;
  color: var(--text3);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: .12em;
  text-transform: uppercase;
}
.unplaced-pool {
  flex: 1 1 auto;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 8px;
  overflow-y: auto;
  background: rgba(0,0,0,.15);
  border: 1px dashed var(--border);
  border-radius: 4px;
}
.unplaced-pool.drag-over { border-color: var(--accent); background: rgba(74,158,255,.05); }
.controls-panel, .add-item-row { display: flex; flex-direction: column; gap: 7px; }
.controls-panel label { color: var(--text2); font-size: 12px; }
.slider-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }
input[type="range"] { width: 100%; }
.duplicate-error {
  min-height: 16px;
  color: var(--danger);
  font-size: 12px;
  line-height: 1.25;
  overflow-wrap: anywhere;
}
.add-item-row input, .add-item-row textarea {
  width: 100%;
  padding: 7px 10px;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  outline: 0;
}
.add-item-row input:focus, .add-item-row textarea:focus { border-color: var(--accent); }
.add-item-row textarea { min-height: 70px; resize: vertical; color: var(--text2); font-size: 12px; }

.iceberg-area {
  flex: 1 1 auto;
  min-width: 0;
  overflow: auto;
  padding: 22px 28px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}
.iceberg-wrapper {
  flex: 0 0 auto;
  position: relative;
  width: var(--canvas-w);
  height: var(--canvas-h);
  overflow: hidden;
  border: 1px solid rgba(84,35,84,.65);
  background: url("iceberg-bg.webp") center / 100% 100% no-repeat;
}
.tiers-container {
  position: absolute;
  inset: 0;
  display: grid;
  z-index: 1;
}
.tier-row {
  position: relative;
  display: flex;
  min-height: 0;
  overflow: hidden;
  border-bottom: 1px solid rgba(91,35,86,.5);
}
.tier-label-cell {
  order: 2;
  flex: 0 0 var(--label-w);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px 10px;
  overflow: hidden;
  border-left: 3px solid rgba(91,35,86,.75);
}
.tier-label-input {
  width: 100%;
  padding: 2px;
  color: #fff;
  background: transparent;
  border: 0;
  outline: 0;
  text-align: center;
  font-size: 22px;
  line-height: 1.05;
  font-weight: 900;
  white-space: normal;
  overflow-wrap: break-word;
  text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 3px 4px rgba(0,0,0,.9);
}
.tier-label-input:focus { outline: 1px solid rgba(255,255,255,.35); background: rgba(0,0,0,.12); }
.tier-items-cell {
  order: 1;
  flex: 1 1 auto;
  position: relative;
  display: block;
  padding: 8px 10px;
  overflow: hidden;
}
.tier-items-cell.drag-over { background: rgba(74,158,255,.06); outline: 1px dashed var(--accent); outline-offset: -4px; }

.item-chip {
  user-select: none;
  color: #fff;
  font-weight: 900;
  letter-spacing: .01em;
  line-height: 1.12;
  text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 3px 4px rgba(0,0,0,.9);
  cursor: grab;
}
.item-chip.dragging { cursor: grabbing; }
.item-chip-text { display: block; overflow-wrap: break-word; }
.tier-items-cell .item-chip {
  position: absolute;
  z-index: 3;
  transform: translate(-50%, -50%) scale(1);
  transform-origin: center center;
  width: max-content;
  max-width: 220px;
  padding: 3px 6px;
  border: 0;
  border-radius: 0;
  background: transparent;
  box-shadow: none;
  transition: transform .16s cubic-bezier(.2,.8,.2,1), color .16s cubic-bezier(.2,.8,.2,1);
}
.tier-items-cell .item-chip:hover,
.tier-items-cell .item-chip.selected {
  background: transparent;
  border: 0;
  box-shadow: none;
  transform: translate(-50%, -50%) scale(1.08);
}
.tier-items-cell .item-chip:hover .item-chip-text,
.tier-items-cell .item-chip.selected .item-chip-text {
  color: var(--remove);
}
.selection-box {
  position: absolute;
  z-index: 8;
  pointer-events: none;
  border: 1px solid rgba(255,231,106,.95);
  background: rgba(255,231,106,.13);
  box-shadow: 0 0 0 1px rgba(0,0,0,.55);
}
.tier-items-cell .item-chip-text {
  width: max-content;
  max-width: 210px;
  text-align: center;
  font-size: var(--entry-size);
  white-space: normal;
}
.unplaced-pool .item-chip {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 5px 8px 5px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  box-shadow: none;
  font-size: 14px;
}
.unplaced-pool .item-chip:hover { background: var(--surface2); border-color: var(--border2); }
.unplaced-pool .item-chip-text { max-width: 190px; text-align: left; }
.item-chip-del {
  display: none;
  flex: 0 0 auto;
  width: 20px;
  height: 20px;
  align-items: center;
  justify-content: center;
  padding: 0;
  color: var(--text3);
  background: transparent;
  border: 0;
  border-radius: 3px;
  font-size: 15px;
  line-height: 1;
}
.unplaced-pool .item-chip-del { display: flex; opacity: 0; }
.unplaced-pool .item-chip:hover .item-chip-del,
.unplaced-pool .item-chip:focus-within .item-chip-del { opacity: 1; }
.unplaced-pool .item-chip-del:hover { color: var(--danger); background: rgba(127,34,34,.2); }
.drag-ghost {
  position: fixed;
  top: -200px;
  left: -200px;
  z-index: -1;
  pointer-events: none;
  color: #fff;
  font-weight: 900;
  line-height: 1.12;
  text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 3px 4px rgba(0,0,0,.9);
}


.detail-sidebar {
  flex: 0 0 var(--detail-w);
  width: var(--detail-w);
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 16px;
  overflow-y: auto;
  background: var(--bg2);
  border-left: 1px solid var(--border);
}
.detail-sidebar h3 {
  margin: 0;
  color: var(--text3);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: .12em;
  text-transform: uppercase;
}
.detail-card {
  display: none;
  padding: 14px;
  background: rgba(0,0,0,.18);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.detail-card.active { display: block; }
.detail-title-input,
.detail-description-input {
  width: 100%;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  outline: 0;
}
.detail-title-input:focus,
.detail-description-input:focus { border-color: var(--accent); }
.detail-title-input {
  margin: 0 0 8px;
  padding: 8px 10px;
  color: #fff;
  font-size: 20px;
  line-height: 1.15;
  font-weight: 900;
  overflow-wrap: anywhere;
  text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 3px 4px rgba(0,0,0,.9);
}
.detail-title-error {
  min-height: 16px;
  margin: -3px 0 8px;
  color: var(--danger);
  font-size: 12px;
  line-height: 1.25;
  overflow-wrap: anywhere;
}
.detail-tier {
  display: block;
  margin-bottom: 14px;
  color: var(--text3);
  font-family: var(--mono);
  font-size: 12px;
  overflow-wrap: anywhere;
}
.detail-description-input {
  min-height: 220px;
  padding: 9px 10px;
  color: var(--text2);
  font-size: 14px;
  line-height: 1.55;
  resize: vertical;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  word-break: break-word;
}
.detail-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 16px;
}
.detail-edit-area { display: flex; flex-direction: column; gap: 8px; }
.detail-edit-area[hidden] { display: none; }
.detail-edit-area input, .detail-edit-area textarea {
  width: 100%;
  padding: 8px 10px;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  outline: 0;
}
.detail-edit-area textarea { min-height: 150px; resize: vertical; }
.detail-edit-area input:focus, .detail-edit-area textarea:focus { border-color: var(--accent); }

.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: rgba(0,0,0,.6);
}
.modal-overlay.hidden { display: none; }
.modal {
  position: relative;
  width: min(640px, calc(100vw - 40px));
  max-height: calc(100vh - 40px);
  overflow: auto;
  padding: 28px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
}
.modal-close {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text3);
  background: transparent;
  border: 0;
  border-radius: 4px;
  font-size: 20px;
}
.modal-close:hover { color: var(--text); background: var(--surface); }
.modal h2 { margin: 0 34px 8px 0; font-size: 20px; line-height: 1.2; }
.tier-badge { display: block; margin-bottom: 16px; color: var(--text3); font-family: var(--mono); font-size: 12px; }
#modal-desc-text, .desc-text, .no-desc { max-width: 100%; overflow-wrap: anywhere; word-break: break-word; white-space: pre-wrap; }
.desc-text { margin: 0; color: var(--text2); font-size: 14px; line-height: 1.55; }
.no-desc { color: var(--text3); font-style: italic; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.modal-edit-area { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
.modal-edit-area input, .modal-edit-area textarea {
  width: 100%;
  padding: 8px 10px;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  outline: 0;
}
.modal-edit-area textarea { min-height: 110px; resize: vertical; }
.modal-edit-area input:focus, .modal-edit-area textarea:focus { border-color: var(--accent); }


/* Click-to-edit detail panel */
[hidden] { display: none !important; }
.editable-display {
  width: 100%;
  border: 1px solid transparent;
  border-radius: 4px;
  cursor: text;
}
.editable-display:hover,
.editable-display:focus {
  border-color: rgba(100,160,255,.22);
  background: rgba(255,255,255,.03);
}
.detail-title-display,
.detail-title-edit {
  margin: 0 0 8px;
  color: #fff;
  font-size: 20px;
  line-height: 1.15;
  font-weight: 900;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  word-break: break-word;
  text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 3px 4px rgba(0,0,0,.9);
}
.detail-title-display { padding: 7px 8px; }
.detail-title-edit,
.detail-description-edit {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  outline: 0;
}
.detail-title-edit {
  min-height: 56px;
  padding: 8px 10px;
  resize: vertical;
}
.detail-title-edit:focus,
.detail-description-edit:focus { border-color: var(--accent); }
.detail-description-display,
.detail-description-edit {
  color: var(--text2);
  font-size: 14px;
  line-height: 1.55;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  word-break: break-word;
}
.detail-description-display {
  min-height: 180px;
  padding: 9px 8px;
}
.detail-description-display.empty {
  color: var(--text3);
  font-style: italic;
}
.detail-description-edit {
  min-height: 220px;
  padding: 9px 10px;
  resize: vertical;
}


/* Markdown detail rendering and subtle detail animation */
.detail-card.active {
  animation: detailIn .18s cubic-bezier(.2,.8,.2,1);
}
@keyframes detailIn {
  from { opacity: .72; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.detail-tier {
  display: inline-block;
  margin: 2px 0 14px;
  padding: 6px 9px;
  color: #dbeafe;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .04em;
  background: rgba(74,158,255,.12);
  border: 1px solid rgba(100,160,255,.35);
  border-radius: 999px;
  overflow-wrap: anywhere;
}
.detail-description-display {
  overflow: hidden;
}
.detail-description-display p { margin: 0 0 .75em; }
.detail-description-display p:last-child { margin-bottom: 0; }
.detail-description-display strong { color: var(--text); font-weight: 900; }
.detail-description-display em { color: var(--text); }
.detail-description-display a { color: #8ec5ff; text-decoration: underline; text-underline-offset: 2px; }
.detail-description-display ul { margin: .35em 0 .8em 1.25em; padding: 0; }
.detail-description-display li { margin: .2em 0; }
.detail-description-display img {
  display: block;
  max-width: 100%;
  height: auto;
  margin: 10px 0;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: rgba(0,0,0,.18);
}
.detail-description-display code {
  padding: 1px 4px;
  background: rgba(255,255,255,.08);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: .92em;
}
.btn.image { background: #1b2a3f; border-color: rgba(100,160,255,.28); color: #b9dcff; }
.btn.image:hover { background: #223755; border-color: rgba(100,160,255,.45); }

/* V12 sidebar polish and markdown tools */
.detail-card {
  padding: 22px 20px;
}
.detail-title-display,
.detail-title-edit {
  margin: 0 0 16px;
  font-size: 30px;
  line-height: 1.08;
}
.detail-title-display {
  padding: 6px 0;
}
.detail-tier {
  display: block;
  margin: 0 0 22px;
  padding: 0;
  color: #dbeafe;
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 900;
  letter-spacing: .04em;
  background: transparent;
  border: 0;
  border-radius: 0;
  text-shadow: 0 2px 4px rgba(0,0,0,.85);
}
.markdown-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 0 0 10px;
  opacity: .86;
  transform: translateY(0);
  transition: opacity .18s ease, transform .18s ease;
}
.detail-card.active .markdown-toolbar {
  animation: detailToolIn .22s cubic-bezier(.2,.8,.2,1);
}
@keyframes detailToolIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: .86; transform: translateY(0); }
}
.format-btn {
  padding: 5px 8px;
  color: #cfe2ff;
  background: rgba(30,45,69,.8);
  border: 1px solid rgba(100,160,255,.2);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  transition: transform .15s ease, background .15s ease, border-color .15s ease;
}
.format-btn:hover {
  background: rgba(36,52,82,.95);
  border-color: rgba(100,160,255,.42);
  transform: translateY(-1px);
}
.detail-description-display,
.detail-description-edit {
  transition: opacity .18s ease, transform .18s ease, border-color .15s ease, background .15s ease;
}
.detail-description-display {
  min-height: 130px;
  padding: 6px 0;
}
.detail-description-display:hover,
.detail-description-display:focus,
.detail-title-display:hover,
.detail-title-display:focus {
  border-color: transparent;
  background: transparent;
  color: #c7d4e8;
}
.detail-description-display img {
  max-height: 260px;
  object-fit: contain;
}



/* V14 detail-panel spacing and guide */
.detail-card {
  padding: 30px 28px;
}
.detail-title-display,
.detail-title-edit {
  margin: 0;
  font-size: 34px;
  line-height: 1.08;
}
.detail-title-display {
  padding: 4px 0 2px;
}
.detail-title-error {
  margin: 4px 0 0;
}
.detail-tier {
  display: block;
  margin: 8px 0 28px;
  padding: 0;
  color: #dbeafe;
  font-family: var(--mono);
  font-size: 18px;
  line-height: 1.2;
  font-weight: 900;
  letter-spacing: .045em;
  background: transparent;
  border: 0;
  border-radius: 0;
  text-shadow: 0 2px 4px rgba(0,0,0,.85);
}
.detail-description-display,
.detail-description-edit {
  margin: 0;
}
.detail-description-display {
  min-height: 150px;
  padding: 0;
}
.detail-description-edit {
  min-height: 220px;
}
.markdown-toolbar,
.format-btn {
  display: none !important;
}
.markdown-guide {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid rgba(100,160,255,.13);
  color: var(--text3);
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.65;
  opacity: .86;
}
.markdown-guide-title {
  margin-bottom: 4px;
  color: #9fb4d3;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: .12em;
  text-transform: uppercase;
}
.markdown-guide code {
  display: inline-block;
  margin: 2px 3px 2px 0;
  padding: 1px 4px;
  color: #cfe2ff;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(100,160,255,.12);
  border-radius: 3px;
  font-family: var(--mono);
}

  margin-top: 24px;
}



/* V15 detail polish */
.detail-card {
  padding: 24px 24px 20px;
  border-color: rgba(255,231,106,.22);
  box-shadow: inset 0 0 0 1px rgba(255,231,106,.04);
}
.detail-card.active {
  border-color: rgba(255,231,106,.28);
  box-shadow: inset 0 0 0 1px rgba(255,231,106,.06);
}
.detail-title-display,
.detail-title-edit {
  margin: 0;
  font-size: 28px;
  line-height: 1.02;
  overflow-wrap: break-word;
  word-break: normal;
  hyphens: auto;
}
.detail-title-display {
  padding: 0 0 2px;
}
.detail-title-edit {
  min-height: 52px;
}
.detail-title-error {
  margin: 4px 0 0;
}
.detail-tier {
  margin: 6px 0 14px;
  font-size: 15px;
  line-height: 1.15;
  letter-spacing: .06em;
  color: #d9e7ff;
}
.detail-description-display,
.detail-description-edit {
  margin: 0;
}
.detail-description-display {
  min-height: 120px;
  padding: 0;
}
.detail-description-edit {
  min-height: 190px;
}
.markdown-guide {
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid rgba(100,160,255,.13);
}
.markdown-guide-title {
  margin: 0;
  color: #9fb4d3;
  cursor: pointer;
  user-select: none;
  list-style: none;
}
.markdown-guide-title::-webkit-details-marker {
  display: none;
}
.markdown-guide-title::after {
  content: 'Show';
  margin-left: 8px;
  color: var(--text3);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.markdown-guide[open] .markdown-guide-title::after {
  content: 'Hide';
}
.markdown-guide-body {
  margin-top: 8px;
}
.detail-actions {
  margin-top: 18px;
}

</style>
</head>
<body>
<header>
  <div class="logo" aria-label="Iceberg">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <polygon points="14,2 22,10 20,10 20,12 8,12 8,10 6,10" fill="rgba(200,230,255,.7)"/>
      <rect x="9" y="12" width="10" height="4" fill="rgba(100,180,255,.4)"/>
      <rect x="7" y="16" width="14" height="4" fill="rgba(60,130,220,.4)"/>
      <rect x="5" y="20" width="18" height="4" fill="rgba(20,80,180,.5)"/>
      <rect x="3" y="24" width="22" height="3" fill="rgba(10,40,120,.6)" rx="1"/>
    </svg>
    Iceberg
  </div>
  <div class="title-area">
    <input type="text" id="chart-title" value="My Iceberg" placeholder="Iceberg title..." spellcheck="false">
  </div>
  <div class="header-actions">
    <button class="btn" id="save-btn">Save JSON</button>
    <button class="btn" id="load-btn">Load JSON</button>
    <button class="btn primary" id="export-btn">Export PNG</button>
  </div>
  <input type="file" id="file-input" accept=".json,application/json">
</header>

<main class="layout">
  <aside class="sidebar">
    <h3>Unplaced Items</h3>
    <div class="unplaced-pool" id="unplaced-pool"></div>

    <div class="controls-panel">
      <h3>Display</h3>
      <label for="entry-size">Entry text size</label>
      <div class="slider-row">
        <input type="range" id="entry-size" min="10" max="24" step="1" value="14">
        <span id="entry-size-value">14px</span>
      </div>
    </div>

    <div class="add-item-row">
      <h3>Add Item</h3>
      <input type="text" id="new-item-name" placeholder="Item name..." maxlength="80" aria-describedby="add-item-error">
      <div class="duplicate-error" id="add-item-error" aria-live="polite"></div>
      <textarea id="new-item-desc" placeholder="Description (optional, supports markdown)..."></textarea>
      <button class="btn primary" id="add-item-btn">Add Item</button>
    </div>
  </aside>

  <section class="iceberg-area">
    <div class="iceberg-wrapper" id="iceberg-wrapper">
      <div class="tiers-container" id="tiers-container"></div>
    </div>
  </section>

  <aside class="detail-sidebar" id="detail-sidebar" aria-label="Entry details">
    <h3>Entry Details</h3>
    <div class="detail-card" id="detail-card">
      <div class="detail-title-display editable-display" id="detail-title-display" role="button" tabindex="0" title="Click to edit title"></div>
      <textarea class="detail-title-edit" id="detail-title-edit" maxlength="80" rows="2" placeholder="Entry title..." hidden></textarea>
      <div class="detail-title-error" id="detail-title-error" aria-live="polite"></div>
      <span class="detail-tier" id="detail-tier"></span>
      <div class="detail-description-display editable-display" id="detail-description-display" role="button" tabindex="0" title="Click to edit description"></div>
      <textarea class="detail-description-edit" id="detail-description-edit" placeholder="Description..." hidden></textarea>
      <details class="markdown-guide" aria-label="Markdown guide">
        <summary class="markdown-guide-title">Markdown guide</summary>
        <div class="markdown-guide-body">
          <div><code>**bold**</code> <code>*italic*</code> <code>`code`</code></div>
          <div><code>- list item</code></div>
          <div><code>[link](https://example.com)</code></div>
          <div><code>![image alt](https://example.com/image.png)</code></div>
        </div>
      </details>
      <div class="detail-actions">
        <button class="btn remove" id="detail-remove-delete-btn">Remove</button>
      </div>
    </div>
  </aside>
</main>

<div class="modal-overlay hidden" id="modal-overlay" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <button class="modal-close" id="modal-close" aria-label="Close">&#x2715;</button>
    <div id="modal-view-mode">
      <h2 id="modal-title"></h2>
      <span class="tier-badge" id="modal-tier"></span>
      <div id="modal-desc-text"></div>
      <div class="modal-actions">
        <button class="btn" id="edit-btn">Edit</button>
        <button class="btn remove" id="modal-remove-delete-btn">Remove</button>
      </div>
    </div>
    <div id="modal-edit-mode" hidden>
      <div class="modal-edit-area">
        <input type="text" id="modal-edit-name" placeholder="Item name..." maxlength="80">
        <textarea id="modal-edit-desc" placeholder="Description..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn" id="cancel-edit-btn">Cancel</button>
        <button class="btn danger" id="delete-edit-btn">Delete</button>
        <button class="btn primary" id="save-edit-btn">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
const TIER_BOUNDARIES = [0, 195, 391, 621.5, 827.5, 1037.5, 1224.5, 1425.5, 1626.5, 1843.5, 2048];
const DEFAULT_TIERS = [
  ['Sky', '#13a9e8'],
  ['Surface', '#0051ff'],
  ['Shallow', '#0531e7'],
  ['Depths', '#0611b8'],
  ['Deep', '#04007c'],
  ['Abyss', '#02004d'],
  ['Lower Abyss', '#01002d'],
  ['Hadopelagic', '#000019'],
  ['Void', '#00000d'],
  ['Blackout', '#000000'],
];
const FIXED_TIER_COUNT = DEFAULT_TIERS.length;

let state = {
  title: 'My Iceberg',
  entryFontSize: 14,
  tiers: DEFAULT_TIERS.map(([label, color]) => ({ id: uid(), label, color })),
  items: []
};

let currentItemId = null;
let dragItemId = null;
let dragItemIds = [];
let dragOffsetX = 0;
let dragOffsetY = 0;
let dragGhost = null;
let dragGroupStart = null;
let selectedItemIds = new Set();
let selectionBox = null;
let selectionStart = null;
let selectionMoved = false;

const $ = id => document.getElementById(id);
const els = {
  title: $('chart-title'), file: $('file-input'), pool: $('unplaced-pool'), tiers: $('tiers-container'), wrapper: $('iceberg-wrapper'),
  entrySize: $('entry-size'), entrySizeValue: $('entry-size-value'), newName: $('new-item-name'), newDesc: $('new-item-desc'), addError: $('add-item-error'),
  modal: $('modal-overlay'), viewMode: $('modal-view-mode'), editMode: $('modal-edit-mode'), modalTitle: $('modal-title'), modalTier: $('modal-tier'), modalDesc: $('modal-desc-text'),
  modalEditName: $('modal-edit-name'), modalEditDesc: $('modal-edit-desc'), removeDelete: $('modal-remove-delete-btn'),
  detailCard: $('detail-card'), detailTitleDisplay: $('detail-title-display'), detailTitleEdit: $('detail-title-edit'), detailTitleError: $('detail-title-error'), detailTier: $('detail-tier'),
  detailDescDisplay: $('detail-description-display'), detailDescEdit: $('detail-description-edit'), detailRemoveDelete: $('detail-remove-delete-btn')
};

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function clamp(num, min, max) {
  return Math.min(Math.max(num, min), max);
}

function normalizeName(name) {
  return String(name || '').trim().toLowerCase();
}
function escapeHtml(value) {
  return String(value || '').replace(/[&<>"']/g, char => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[char]));
}

function safeUrl(url) {
  const value = String(url || '').trim();
  if (/^(https?:|data:image\/)/i.test(value)) return value;
  return '';
}

function renderInlineMarkdown(text) {
  let html = escapeHtml(text);
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, url) => {
    const cleanUrl = safeUrl(url);
    if (!cleanUrl) return escapeHtml(alt);
    return `<img src="${cleanUrl}" alt="${escapeHtml(alt)}" loading="lazy">`;
  });
  html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  return html;
}

function renderMarkdown(markdown) {
  const source = String(markdown || '').trim();
  if (!source) return '';
  const lines = source.split(/\r?\n/);
  const chunks = [];
  let paragraph = [];
  let list = [];

  const flushParagraph = () => {
    if (!paragraph.length) return;
    chunks.push(`<p>${renderInlineMarkdown(paragraph.join('\n')).replace(/\n/g, '<br>')}</p>`);
    paragraph = [];
  };
  const flushList = () => {
    if (!list.length) return;
    chunks.push(`<ul>${list.map(item => `<li>${renderInlineMarkdown(item)}</li>`).join('')}</ul>`);
    list = [];
  };

  lines.forEach(line => {
    const bullet = line.match(/^\s*[-*]\s+(.+)$/);
    if (bullet) {
      flushParagraph();
      list.push(bullet[1]);
      return;
    }
    if (!line.trim()) {
      flushParagraph();
      flushList();
      return;
    }
    flushList();
    paragraph.push(line);
  });
  flushParagraph();
  flushList();
  return chunks.join('');
}

function setDescriptionDisplay(markdown) {
  const description = String(markdown || '');
  if (description.trim()) {
    els.detailDescDisplay.innerHTML = renderMarkdown(description);
    els.detailDescDisplay.classList.remove('empty');
  } else {
    els.detailDescDisplay.textContent = 'No description yet. Click to add one.';
    els.detailDescDisplay.classList.add('empty');
  }
}


function findDuplicateName(name, excludeId = null) {
  const normalized = normalizeName(name);
  return state.items.find(item => item.id !== excludeId && normalizeName(item.name) === normalized);
}

function showAddError(message = '') {
  els.addError.textContent = message;
}

function clearDragGhost() {
  if (dragGhost) dragGhost.remove();
  dragGhost = null;
}

function renderSelection() {
  document.querySelectorAll('.tier-items-cell .item-chip').forEach(chip => {
    chip.classList.toggle('selected', selectedItemIds.has(chip.dataset.itemId));
  });
}

function clearSelection() {
  selectedItemIds.clear();
  renderSelection();
}

function canvasPointFromClient(clientX, clientY) {
  const rect = els.wrapper.getBoundingClientRect();
  return { x: clientX - rect.left, y: clientY - rect.top };
}

function getTierCell(tierId) {
  return document.querySelector(`.tier-items-cell[data-tier-id="${CSS.escape(tierId)}"]`);
}

function getItemCanvasPosition(item) {
  if (!item?.tierId) return null;
  const cell = getTierCell(item.tierId);
  if (!cell) return null;
  const cellRect = cell.getBoundingClientRect();
  const wrapperRect = els.wrapper.getBoundingClientRect();
  return {
    x: cellRect.left - wrapperRect.left + (Number(item.xPct) || 50) / 100 * cellRect.width,
    y: cellRect.top - wrapperRect.top + (Number(item.yPct) || 50) / 100 * cellRect.height,
    tierId: item.tierId
  };
}

function getTierCellAtCanvasY(canvasY) {
  const wrapperRect = els.wrapper.getBoundingClientRect();
  let fallback = null;
  for (const cell of document.querySelectorAll('.tier-items-cell')) {
    const rect = cell.getBoundingClientRect();
    const top = rect.top - wrapperRect.top;
    const bottom = rect.bottom - wrapperRect.top;
    fallback = cell;
    if (canvasY >= top && canvasY <= bottom) return cell;
  }
  return fallback;
}

function applyItemCanvasPosition(item, canvasX, canvasY, width = 120, height = 28) {
  const wrapperRect = els.wrapper.getBoundingClientRect();
  const cell = getTierCellAtCanvasY(canvasY);
  if (!cell) return;
  const rect = cell.getBoundingClientRect();
  const left = rect.left - wrapperRect.left;
  const top = rect.top - wrapperRect.top;
  const localX = clamp(canvasX - left, width / 2, Math.max(width / 2, rect.width - width / 2));
  const localY = clamp(canvasY - top, height / 2, Math.max(height / 2, rect.height - height / 2));
  item.tierId = cell.dataset.tierId;
  const tier = state.tiers.find(t => t.id === item.tierId);
  item.lastTierId = item.tierId;
  item.lastTierLabel = tier?.label || '';
  item.xPct = rect.width ? localX / rect.width * 100 : 50;
  item.yPct = rect.height ? localY / rect.height * 100 : 50;
  item.positionMode = 'center';
}

function tierGridTemplate() {
  const total = TIER_BOUNDARIES[TIER_BOUNDARIES.length - 1];
  return TIER_BOUNDARIES.slice(1).map((boundary, i) => `${((boundary - TIER_BOUNDARIES[i]) / total * 100).toFixed(4)}fr`).join(' ');
}

function normalizeState() {
  const oldTiers = Array.isArray(state.tiers) ? state.tiers : [];
  const oldTierIds = new Set(oldTiers.map(t => t.id));
  state.title = typeof state.title === 'string' ? state.title : 'My Iceberg';
  state.entryFontSize = clamp(Number(state.entryFontSize) || 14, 10, 24);
  state.tiers = DEFAULT_TIERS.map(([label, color], i) => ({
    id: oldTiers[i]?.id || uid(),
    label: oldTiers[i]?.label || label,
    color: oldTiers[i]?.color || color
  }));
  const validTierIds = new Set(state.tiers.map(t => t.id));
  state.items = Array.isArray(state.items) ? state.items : [];
  state.items.forEach(item => {
    item.name = String(item.name || '').trim() || 'Untitled';
    item.description = String(item.description || '');
    if (item.tierId && (!oldTierIds.has(item.tierId) || !validTierIds.has(item.tierId))) {
      item.tierId = null;
      delete item.xPct;
      delete item.yPct;
    }
  });
}

function applyEntrySize() {
  document.documentElement.style.setProperty('--entry-size', `${state.entryFontSize}px`);
  els.entrySize.value = state.entryFontSize;
  els.entrySizeValue.textContent = `${state.entryFontSize}px`;
}

function render() {
  normalizeState();
  els.title.value = state.title;
  applyEntrySize();
  renderTiers();
  renderPool();
  if (currentItemId) renderDetailPanel();
}

function renderTiers() {
  const fragment = document.createDocumentFragment();
  els.tiers.innerHTML = '';
  els.tiers.style.gridTemplateRows = tierGridTemplate();

  state.tiers.forEach((tier, index) => {
    const row = document.createElement('div');
    row.className = 'tier-row';
    row.dataset.tierId = tier.id;

    const itemsCell = document.createElement('div');
    itemsCell.className = 'tier-items-cell';
    itemsCell.dataset.tierId = tier.id;

    state.items.filter(item => item.tierId === tier.id).forEach((item, itemIndex) => {
      itemsCell.appendChild(makeChip(item, itemIndex));
    });

    const labelCell = document.createElement('div');
    labelCell.className = 'tier-label-cell';

    const labelInput = document.createElement('input');
    labelInput.className = 'tier-label-input';
    labelInput.value = tier.label;
    labelInput.spellcheck = false;
    labelInput.dataset.tierIndex = index;
    labelCell.appendChild(labelInput);

    row.append(itemsCell, labelCell);
    fragment.appendChild(row);
  });

  els.tiers.appendChild(fragment);
  renderSelection();
}

function renderPool() {
  const fragment = document.createDocumentFragment();
  els.pool.innerHTML = '';
  state.items.filter(item => !item.tierId).forEach(item => fragment.appendChild(makeChip(item)));
  els.pool.appendChild(fragment);
}

function makeChip(item, itemIndex = 0) {
  const chip = document.createElement('div');
  chip.className = 'item-chip';
  chip.draggable = true;
  chip.dataset.itemId = item.id;

  if (item.tierId) {
    const defaultX = 2 + (itemIndex % 4) * 23;
    const defaultY = 8 + Math.floor(itemIndex / 4) * 16;
    chip.style.left = `${item.xPct ?? defaultX}%`;
    chip.style.top = `${item.yPct ?? defaultY}%`;
  }

  const text = document.createElement('span');
  text.className = 'item-chip-text';
  text.textContent = item.name;
  chip.appendChild(text);

  if (!item.tierId) {
    const del = document.createElement('button');
    del.type = 'button';
    del.className = 'item-chip-del';
    del.dataset.itemId = item.id;
    del.setAttribute('aria-label', `Delete ${item.name}`);
    del.textContent = '×';
    chip.appendChild(del);
  }

  return chip;
}

function addItem() {
  const name = els.newName.value.trim();
  if (!name) {
    showAddError('');
    els.newName.focus();
    return;
  }
  if (findDuplicateName(name)) {
    showAddError(`${name} already exists!`);
    els.newName.focus();
    els.newName.select();
    return;
  }
  state.items.push({ id: uid(), name, description: els.newDesc.value.trim(), tierId: null });
  els.newName.value = '';
  els.newDesc.value = '';
  showAddError('');
  els.newName.focus();
  renderPool();
}

function removeItemToPool(item) {
  if (item.tierId) {
    const tier = state.tiers.find(t => t.id === item.tierId);
    item.lastTierId = item.tierId;
    item.lastTierLabel = tier?.label || '';
  }
  item.tierId = null;
  delete item.xPct;
  delete item.yPct;
}

function deleteItem(id) {
  selectedItemIds.delete(id);
  state.items = state.items.filter(item => item.id !== id);
  if (currentItemId === id) currentItemId = null;
  render();
  renderDetailPanel();
}

function makeDragGhost(chip, item) {
  clearDragGhost();

  const chipStyles = getComputedStyle(chip);
  const textEl = chip.querySelector('.item-chip-text');
  const textStyles = getComputedStyle(textEl || chip);

  dragGhost = document.createElement('div');
  dragGhost.className = 'drag-ghost';
  dragGhost.textContent = item?.name || textEl?.textContent || chip.textContent.trim();

  Object.assign(dragGhost.style, {
    fontFamily: chipStyles.fontFamily,
    fontSize: textStyles.fontSize,
    fontWeight: chipStyles.fontWeight,
    letterSpacing: chipStyles.letterSpacing,
    lineHeight: chipStyles.lineHeight,
    textAlign: item?.tierId ? 'center' : 'left',
    whiteSpace: textStyles.whiteSpace,
    overflowWrap: textStyles.overflowWrap,
    wordBreak: textStyles.wordBreak,
    width: item?.tierId ? `${textEl?.offsetWidth || chip.offsetWidth}px` : 'auto',
    maxWidth: item?.tierId ? `${textEl?.offsetWidth || chip.offsetWidth}px` : 'none',
    padding: '0',
    margin: '0',
    background: 'transparent',
    border: '0',
    boxShadow: 'none'
  });

  if (!item?.tierId) {
    dragGhost.style.whiteSpace = 'nowrap';
  }

  document.body.appendChild(dragGhost);
  return dragGhost;
}

function setDragItemFromEvent(e) {
  if (e.target.closest('.item-chip-del')) {
    e.preventDefault();
    return null;
  }
  const chip = e.target.closest('.item-chip');
  if (!chip) return null;

  dragItemId = chip.dataset.itemId;
  const item = state.items.find(i => i.id === dragItemId);
  if (!item) return null;

  if (item.tierId) {
    if (!selectedItemIds.has(item.id)) {
      selectedItemIds = new Set([item.id]);
      renderSelection();
    }
    dragItemIds = [...selectedItemIds].filter(id => state.items.some(i => i.id === id && i.tierId));
  } else {
    dragItemIds = [item.id];
  }

  const rect = chip.getBoundingClientRect();
  dragOffsetX = rect.width / 2;
  dragOffsetY = rect.height / 2;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragItemId);

  const ghost = makeDragGhost(chip, item);
  e.dataTransfer.setDragImage?.(ghost, Math.round((ghost.offsetWidth || chip.offsetWidth) / 2), Math.round((ghost.offsetHeight || chip.offsetHeight) / 2));

  if (item.tierId) {
    const primaryStart = getItemCanvasPosition(item);
    dragGroupStart = {
      primaryId: item.id,
      primary: primaryStart,
      items: dragItemIds.map(id => {
        const groupItem = state.items.find(i => i.id === id);
        const groupChip = document.querySelector(`.tier-items-cell .item-chip[data-item-id="${CSS.escape(id)}"]`);
        const pos = getItemCanvasPosition(groupItem);
        return pos ? {
          id,
          x: pos.x,
          y: pos.y,
          width: groupChip?.offsetWidth || 120,
          height: groupChip?.offsetHeight || 28
        } : null;
      }).filter(Boolean)
    };
  } else {
    dragGroupStart = null;
  }

  setTimeout(() => chip.classList.add('dragging'), 0);
  return chip;
}

function dropOnTier(e, tierId) {
  e.preventDefault();
  const cell = e.target.closest('.tier-items-cell');
  if (!cell) return;
  cell.classList.remove('drag-over');
  if (!dragItemId) return;

  const item = state.items.find(i => i.id === dragItemId);
  if (!item) return;

  const rect = cell.getBoundingClientRect();
  const wrapperRect = els.wrapper.getBoundingClientRect();
  const chip = document.querySelector(`.item-chip[data-item-id="${CSS.escape(dragItemId)}"]`);
  const chipWidth = chip?.offsetWidth || dragGhost?.offsetWidth || 120;
  const chipHeight = chip?.offsetHeight || dragGhost?.offsetHeight || 28;
  const centerX = clamp(e.clientX - rect.left, chipWidth / 2, Math.max(chipWidth / 2, rect.width - chipWidth / 2));
  const centerY = clamp(e.clientY - rect.top, chipHeight / 2, Math.max(chipHeight / 2, rect.height - chipHeight / 2));
  const targetCanvasX = rect.left - wrapperRect.left + centerX;
  const targetCanvasY = rect.top - wrapperRect.top + centerY;

  if (dragGroupStart?.primary && dragGroupStart.items.length > 1) {
    const dx = targetCanvasX - dragGroupStart.primary.x;
    const dy = targetCanvasY - dragGroupStart.primary.y;
    dragGroupStart.items.forEach(start => {
      const groupItem = state.items.find(i => i.id === start.id);
      if (groupItem) applyItemCanvasPosition(groupItem, start.x + dx, start.y + dy, start.width, start.height);
    });
  } else if (dragGroupStart?.primary) {
    applyItemCanvasPosition(item, targetCanvasX, targetCanvasY, chipWidth, chipHeight);
  } else {
    item.tierId = tierId;
    const tier = state.tiers.find(t => t.id === tierId);
    item.lastTierId = tierId;
    item.lastTierLabel = tier?.label || '';
    item.xPct = rect.width ? centerX / rect.width * 100 : 50;
    item.yPct = rect.height ? centerY / rect.height * 100 : 50;
    item.positionMode = 'center';
  }

  dragItemId = null;
  dragItemIds = [];
  dragGroupStart = null;
  clearDragGhost();
  render();
}

function dropOnPool(e) {
  e.preventDefault();
  els.pool.classList.remove('drag-over');
  if (!dragItemId) return;
  const item = state.items.find(i => i.id === dragItemId);
  if (item) removeItemToPool(item);
  dragItemId = null;
  dragItemIds = [];
  dragGroupStart = null;
  clearDragGhost();
  render();
}

function showDetailTitleError(message = '') {
  els.detailTitleError.textContent = message;
}

function renderDetailPanel() {
  const item = state.items.find(i => i.id === currentItemId);
  if (!item) {
    els.detailCard.classList.remove('active');
    showDetailTitleError('');
    return;
  }

  const tier = state.tiers.find(t => t.id === item.tierId);
  const lastTier = item.lastTierId ? state.tiers.find(t => t.id === item.lastTierId) : null;
  const lastTierLabel = lastTier?.label || item.lastTierLabel;

  els.detailTitleDisplay.textContent = item.name;
  els.detailTitleEdit.value = item.name;
  const description = item.description || '';
  setDescriptionDisplay(description);
  els.detailDescEdit.value = description;
  els.detailTitleDisplay.hidden = false;
  els.detailTitleEdit.hidden = true;
  els.detailDescDisplay.hidden = false;
  els.detailDescEdit.hidden = true;
  els.detailTier.textContent = tier ? tier.label : (lastTierLabel ? `Last tier: ${lastTierLabel}` : 'Unplaced');
  els.detailRemoveDelete.textContent = item.tierId ? 'Remove' : 'Delete';
  els.detailRemoveDelete.className = item.tierId ? 'btn remove' : 'btn danger';
  showDetailTitleError('');
  els.detailCard.classList.remove('active');
  void els.detailCard.offsetWidth;
  els.detailCard.classList.add('active');
}

function openModal(itemId) {
  currentItemId = itemId;
  renderDetailPanel();
}

function closeModal() {
  els.modal.classList.add('hidden');
}

function beginTitleEdit() {
  const item = state.items.find(i => i.id === currentItemId);
  if (!item) return;
  els.detailTitleEdit.value = item.name;
  els.detailTitleDisplay.hidden = true;
  els.detailTitleEdit.hidden = false;
  els.detailTitleEdit.focus();
  els.detailTitleEdit.select();
}

function finishTitleEdit() {
  const item = state.items.find(i => i.id === currentItemId);
  if (!item) return;
  const name = els.detailTitleEdit.value.trim();
  if (!name) {
    showDetailTitleError('Title cannot be blank.');
    els.detailTitleEdit.value = item.name;
    els.detailTitleEdit.focus();
    return;
  }
  const duplicate = findDuplicateName(name, item.id);
  if (duplicate) {
    showDetailTitleError(`${name} already exists!`);
    els.detailTitleEdit.value = item.name;
    els.detailTitleEdit.focus();
    return;
  }
  showDetailTitleError('');
  item.name = name;
  els.detailTitleDisplay.textContent = item.name;
  els.detailTitleDisplay.hidden = false;
  els.detailTitleEdit.hidden = true;
  renderTiers();
  renderPool();
}

function beginDescriptionEdit() {
  const item = state.items.find(i => i.id === currentItemId);
  if (!item) return;
  els.detailDescEdit.value = item.description || '';
  els.detailDescDisplay.hidden = true;
  els.detailDescEdit.hidden = false;
  els.detailDescEdit.focus();
}

function finishDescriptionEdit() {
  const item = state.items.find(i => i.id === currentItemId);
  if (!item) return;
  item.description = els.detailDescEdit.value;
  const description = item.description || '';
  setDescriptionDisplay(description);
  els.detailDescDisplay.hidden = false;
  els.detailDescEdit.hidden = true;
}

function insertTextIntoDescription(text) {
  const item = state.items.find(i => i.id === currentItemId);
  if (!item) return;
  const addition = String(text || '');
  const existing = String(item.description || '').trimEnd();
  item.description = `${existing}${existing ? '\n\n' : ''}${addition}`;
  if (!els.detailDescEdit.hidden) {
    els.detailDescEdit.value = item.description;
    els.detailDescEdit.focus();
  } else {
    setDescriptionDisplay(item.description);
  }
}

function ensureDescriptionEdit() {
  if (!currentItemId) return false;
  if (els.detailDescEdit.hidden) beginDescriptionEdit();
  return true;
}

function syncDescriptionDraft() {
  const item = state.items.find(i => i.id === currentItemId);
  if (!item) return;
  item.description = els.detailDescEdit.value;
}

function replaceSelectionInDescription(before, after = '', placeholder = 'text') {
  if (!ensureDescriptionEdit()) return;
  const textarea = els.detailDescEdit;
  const start = textarea.selectionStart ?? textarea.value.length;
  const end = textarea.selectionEnd ?? textarea.value.length;
  const selected = textarea.value.slice(start, end) || placeholder;
  textarea.setRangeText(`${before}${selected}${after}`, start, end, 'select');
  textarea.focus();
  syncDescriptionDraft();
}

function insertAtDescriptionCursor(text) {
  if (!ensureDescriptionEdit()) return;
  const textarea = els.detailDescEdit;
  const start = textarea.selectionStart ?? textarea.value.length;
  const end = textarea.selectionEnd ?? textarea.value.length;
  const prefix = start > 0 && textarea.value[start - 1] !== '\n' ? '\n' : '';
  textarea.setRangeText(prefix + text, start, end, 'end');
  textarea.focus();
  syncDescriptionDraft();
}

function handleMarkdownToolbar(action) {
  if (!currentItemId) return;
  if (action === 'bold') return replaceSelectionInDescription('**', '**', 'bold text');
  if (action === 'italic') return replaceSelectionInDescription('*', '*', 'italic text');
  if (action === 'code') return replaceSelectionInDescription('`', '`', 'code');
  if (action === 'bullet') return insertAtDescriptionCursor('- list item');
  if (action === 'link') {
    if (!ensureDescriptionEdit()) return;
    const url = prompt('Link URL');
    if (!url) return;
    const clean = safeUrl(url);
    if (!clean || !/^https?:/i.test(clean)) return alert('Please use an http or https URL.');
    replaceSelectionInDescription('[', `](${clean})`, 'link text');
    return;
  }
  if (action === 'image') {
    if (!ensureDescriptionEdit()) return;
    const url = prompt('Image URL');
    if (!url) return;
    const clean = safeUrl(url);
    if (!clean || !/^https?:/i.test(clean)) return alert('Please use an http or https image URL.');
    const alt = prompt('Image alt text', 'image') || 'image';
    insertAtDescriptionCursor(`![${alt.replace(/[\[\]()]/g, '').trim() || 'image'}](${clean})`);
  }
}

function removeOrDeleteCurrentItem() {
  const item = state.items.find(i => i.id === currentItemId);
  if (!item) return;
  if (item.tierId) {
    removeItemToPool(item);
    render();
    renderDetailPanel();
  } else {
    deleteItem(item.id);
    currentItemId = null;
    renderDetailPanel();
  }
}

function saveState() {
  state.title = els.title.value;
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${state.title || 'iceberg'}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadState(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const loaded = JSON.parse(e.target.result);
      if (!loaded || !Array.isArray(loaded.tiers) || !Array.isArray(loaded.items)) throw new Error('Bad state');
      state = loaded;
      normalizeState();
      render();
    } catch {
      alert('Invalid JSON file.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function exportImage() {
  state.title = els.title.value;
  const run = () => requestAnimationFrame(() => {
    html2canvas(els.wrapper, {
      backgroundColor: '#0a0e1a',
      scale: 2,
      useCORS: true,
      logging: false,
      windowWidth: els.wrapper.scrollWidth,
      windowHeight: els.wrapper.scrollHeight
    }).then(canvas => {
      const a = document.createElement('a');
      a.download = `${state.title || 'iceberg'}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    });
  });

  if (window.html2canvas) {
    run();
    return;
  }
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
  script.onload = run;
  document.head.appendChild(script);
}

function beginSelection(e) {
  if (e.button !== 0 || e.target.closest('.item-chip') || e.target.closest('.tier-label-input')) return;
  const cell = e.target.closest('.tier-items-cell');
  if (!cell) return;
  e.preventDefault();
  clearSelection();
  selectionMoved = false;
  selectionStart = canvasPointFromClient(e.clientX, e.clientY);
  selectionBox = document.createElement('div');
  selectionBox.className = 'selection-box';
  els.wrapper.appendChild(selectionBox);
  updateSelectionBox(e);
}

function updateSelectionBox(e) {
  if (!selectionBox || !selectionStart) return;
  const current = canvasPointFromClient(e.clientX, e.clientY);
  const left = Math.min(selectionStart.x, current.x);
  const top = Math.min(selectionStart.y, current.y);
  const width = Math.abs(selectionStart.x - current.x);
  const height = Math.abs(selectionStart.y - current.y);
  if (width > 4 || height > 4) selectionMoved = true;
  Object.assign(selectionBox.style, {
    left: `${left}px`,
    top: `${top}px`,
    width: `${width}px`,
    height: `${height}px`
  });

  const boxRect = selectionBox.getBoundingClientRect();
  selectedItemIds.clear();
  if (selectionMoved) {
    document.querySelectorAll('.tier-items-cell .item-chip').forEach(chip => {
      const r = chip.getBoundingClientRect();
      const intersects = !(r.right < boxRect.left || r.left > boxRect.right || r.bottom < boxRect.top || r.top > boxRect.bottom);
      if (intersects) selectedItemIds.add(chip.dataset.itemId);
    });
  }
  renderSelection();
}

function endSelection() {
  if (!selectionBox) return;
  selectionBox.remove();
  selectionBox = null;
  selectionStart = null;
}

els.title.addEventListener('input', e => { state.title = e.target.value; });
$('save-btn').addEventListener('click', saveState);
$('load-btn').addEventListener('click', () => els.file.click());
$('export-btn').addEventListener('click', exportImage);
els.file.addEventListener('change', loadState);
$('add-item-btn').addEventListener('click', addItem);
els.newName.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
els.newName.addEventListener('input', () => showAddError(''));
els.entrySize.addEventListener('input', e => {
  state.entryFontSize = Number(e.target.value);
  applyEntrySize();
});

els.tiers.addEventListener('input', e => {
  if (!e.target.classList.contains('tier-label-input')) return;
  const tier = state.tiers[Number(e.target.dataset.tierIndex)];
  if (tier) tier.label = e.target.value;
});

els.tiers.addEventListener('mousedown', beginSelection);
document.addEventListener('mousemove', updateSelectionBox);
document.addEventListener('mouseup', endSelection);

document.addEventListener('dragstart', e => { setDragItemFromEvent(e); });
document.addEventListener('dragend', e => {
  e.target.closest('.item-chip')?.classList.remove('dragging');
  dragItemId = null;
  dragItemIds = [];
  dragGroupStart = null;
  clearDragGhost();
});
document.addEventListener('click', e => {
  if (selectionMoved) {
    selectionMoved = false;
    return;
  }
  const deleteButton = e.target.closest('.item-chip-del');
  if (deleteButton) {
    e.stopPropagation();
    deleteItem(deleteButton.dataset.itemId);
    return;
  }
  const chip = e.target.closest('.item-chip');
  if (chip) {
    selectedItemIds = new Set([chip.dataset.itemId]);
    renderSelection();
    openModal(chip.dataset.itemId);
  }
});

els.tiers.addEventListener('dragover', e => {
  const cell = e.target.closest('.tier-items-cell');
  if (!cell) return;
  e.preventDefault();
  cell.classList.add('drag-over');
});
els.tiers.addEventListener('dragleave', e => {
  const cell = e.target.closest('.tier-items-cell');
  if (cell && !cell.contains(e.relatedTarget)) cell.classList.remove('drag-over');
});
els.tiers.addEventListener('drop', e => {
  const cell = e.target.closest('.tier-items-cell');
  if (cell) dropOnTier(e, cell.dataset.tierId);
});
els.pool.addEventListener('dragover', e => { e.preventDefault(); els.pool.classList.add('drag-over'); });
els.pool.addEventListener('dragleave', () => els.pool.classList.remove('drag-over'));
els.pool.addEventListener('drop', dropOnPool);

els.modal.addEventListener('click', e => { if (e.target === els.modal) closeModal(); });
$('modal-close').addEventListener('click', closeModal);
els.detailTitleDisplay.addEventListener('click', beginTitleEdit);
els.detailTitleDisplay.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); beginTitleEdit(); } });
els.detailTitleEdit.addEventListener('blur', finishTitleEdit);
els.detailTitleEdit.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); finishTitleEdit(); } });
els.detailDescDisplay.addEventListener('click', beginDescriptionEdit);
els.detailDescDisplay.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); beginDescriptionEdit(); } });
els.detailDescEdit.addEventListener('input', syncDescriptionDraft);
els.detailDescEdit.addEventListener('blur', finishDescriptionEdit);
els.detailRemoveDelete.addEventListener('click', removeOrDeleteCurrentItem);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

render();
</script>
</body>
</html>
