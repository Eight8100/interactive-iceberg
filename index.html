<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Iceberg Tier List</title>
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #111827;
  --bg3: #1a2236;
  --surface: #1e2d45;
  --surface2: #243452;
  --border: rgba(100,160,255,.18);
  --border2: rgba(100,160,255,.34);
  --text: #e8eef8;
  --text2: #9fb0c8;
  --text3: #64748f;
  --accent: #4a9eff;
  --accent2: #2563eb;
  --danger: #f87171;
  --remove: #ffe76a;
  --font: Georgia, serif;
  --mono: "Courier New", monospace;
  --header-h: 66px;
  --sidebar-w: 270px;
  --canvas-w: 980px;
  --canvas-h: 1752px;
  --label-w: 185px;
  --entry-size: 14px;
}

* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; overflow: hidden; }
body { font-family: var(--font); background: var(--bg); color: var(--text); }

button, input, textarea { font: inherit; }
button { cursor: pointer; }

header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 20;
  height: var(--header-h);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 18px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}

.logo { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 700; }
.logo svg { width: 28px; height: 28px; flex: 0 0 auto; }
.title-area { flex: 1 1 auto; min-width: 180px; }
#chart-title {
  width: 100%;
  padding: 4px 0;
  color: #fff;
  background: transparent;
  border: 0;
  border-bottom: 1px solid var(--border);
  outline: 0;
  font-size: 18px;
  font-weight: 900;
  text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 3px 4px rgba(0,0,0,.9);
}
#chart-title:focus { border-bottom-color: var(--accent); }
.header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
#file-input { display: none; }

.btn {
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  white-space: nowrap;
  transition: background .15s, border-color .15s, color .15s;
}
.btn:hover { background: var(--surface2); border-color: var(--border2); }
.btn.primary { background: var(--accent2); border-color: var(--accent); color: #fff; }
.btn.primary:hover { background: #1d4ed8; }
.btn.danger { background: #3b1a1a; border-color: #7f2222; color: var(--danger); }
.btn.danger:hover { background: #4a2020; }
.btn.remove { background: #3a310d; border-color: #a8871a; color: var(--remove); }
.btn.remove:hover { background: #4a3f11; border-color: #d6ad24; }

.layout {
  display: flex;
  height: calc(100vh - var(--header-h));
  margin-top: var(--header-h);
  overflow: hidden;
}

.sidebar {
  flex: 0 0 var(--sidebar-w);
  width: var(--sidebar-w);
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 16px;
  overflow: hidden;
  background: var(--bg2);
  border-right: 1px solid var(--border);
}
.sidebar h3 {
  margin: 0;
  color: var(--text3);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: .12em;
  text-transform: uppercase;
}
.unplaced-pool {
  flex: 1 1 auto;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 8px;
  overflow-y: auto;
  background: rgba(0,0,0,.15);
  border: 1px dashed var(--border);
  border-radius: 4px;
}
.unplaced-pool.drag-over { border-color: var(--accent); background: rgba(74,158,255,.05); }
.controls-panel, .add-item-row { display: flex; flex-direction: column; gap: 7px; }
.controls-panel label { color: var(--text2); font-size: 12px; }
.slider-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }
input[type="range"] { width: 100%; }
.add-item-row input, .add-item-row textarea {
  width: 100%;
  padding: 7px 10px;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  outline: 0;
}
.add-item-row input:focus, .add-item-row textarea:focus { border-color: var(--accent); }
.add-item-row textarea { min-height: 70px; resize: vertical; color: var(--text2); font-size: 12px; }

.iceberg-area {
  flex: 1 1 auto;
  min-width: 0;
  overflow: auto;
  padding: 22px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.iceberg-wrapper {
  flex: 0 0 auto;
  position: relative;
  width: var(--canvas-w);
  height: var(--canvas-h);
  overflow: hidden;
  border: 1px solid rgba(84,35,84,.65);
  background: url("iceberg-bg.webp") center / 100% 100% no-repeat;
}
.tiers-container {
  position: absolute;
  inset: 0;
  display: grid;
  z-index: 1;
}
.tier-row {
  position: relative;
  display: flex;
  min-height: 0;
  overflow: hidden;
  border-bottom: 1px solid rgba(91,35,86,.5);
}
.tier-label-cell {
  order: 2;
  flex: 0 0 var(--label-w);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px 10px;
  overflow: hidden;
  border-left: 3px solid rgba(91,35,86,.75);
}
.tier-label-input {
  width: 100%;
  padding: 2px;
  color: #fff;
  background: transparent;
  border: 0;
  outline: 0;
  text-align: center;
  font-size: 22px;
  line-height: 1.05;
  font-weight: 900;
  white-space: normal;
  overflow-wrap: break-word;
  text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 3px 4px rgba(0,0,0,.9);
}
.tier-label-input:focus { outline: 1px solid rgba(255,255,255,.35); background: rgba(0,0,0,.12); }
.tier-items-cell {
  order: 1;
  flex: 1 1 auto;
  position: relative;
  display: block;
  padding: 8px 10px;
  overflow: hidden;
}
.tier-items-cell.drag-over { background: rgba(74,158,255,.06); outline: 1px dashed var(--accent); outline-offset: -4px; }

.item-chip {
  user-select: none;
  color: #fff;
  font-weight: 900;
  letter-spacing: .01em;
  line-height: 1.12;
  text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 3px 4px rgba(0,0,0,.9);
  cursor: grab;
}
.item-chip.dragging { opacity: .45; cursor: grabbing; }
.item-chip-text { display: block; overflow-wrap: break-word; }
.tier-items-cell .item-chip {
  position: absolute;
  z-index: 3;
  max-width: 220px;
  padding: 3px 6px;
  border: 1px solid transparent;
  border-radius: 8px;
  background: transparent;
}
.tier-items-cell .item-chip:hover {
  background: rgba(13,22,39,.82);
  border-color: rgba(180,220,255,.3);
  box-shadow: 0 2px 9px rgba(0,0,0,.32);
}
.tier-items-cell .item-chip:hover .item-chip-text { color: var(--remove); }
.tier-items-cell .item-chip-text {
  max-width: 210px;
  text-align: center;
  font-size: var(--entry-size);
}
.unplaced-pool .item-chip {
  position: relative;
  display: block;
  padding: 5px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  box-shadow: none;
  font-size: 14px;
}
.unplaced-pool .item-chip:hover { background: var(--surface2); border-color: var(--border2); }
.unplaced-pool .item-chip-text { max-width: 210px; text-align: left; }
.item-chip-del { display: none; }

.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: rgba(0,0,0,.6);
}
.modal-overlay.hidden { display: none; }
.modal {
  position: relative;
  width: min(640px, calc(100vw - 40px));
  max-height: calc(100vh - 40px);
  overflow: auto;
  padding: 28px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
}
.modal-close {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text3);
  background: transparent;
  border: 0;
  border-radius: 4px;
  font-size: 20px;
}
.modal-close:hover { color: var(--text); background: var(--surface); }
.modal h2 { margin: 0 34px 8px 0; font-size: 20px; line-height: 1.2; }
.tier-badge { display: block; margin-bottom: 16px; color: var(--text3); font-family: var(--mono); font-size: 12px; }
#modal-desc-text, .desc-text, .no-desc { max-width: 100%; overflow-wrap: anywhere; word-break: break-word; white-space: pre-wrap; }
.desc-text { margin: 0; color: var(--text2); font-size: 14px; line-height: 1.55; }
.no-desc { color: var(--text3); font-style: italic; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.modal-edit-area { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
.modal-edit-area input, .modal-edit-area textarea {
  width: 100%;
  padding: 8px 10px;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  outline: 0;
}
.modal-edit-area textarea { min-height: 110px; resize: vertical; }
.modal-edit-area input:focus, .modal-edit-area textarea:focus { border-color: var(--accent); }
</style>
</head>
<body>
<header>
  <div class="logo" aria-label="Iceberg">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <polygon points="14,2 22,10 20,10 20,12 8,12 8,10 6,10" fill="rgba(200,230,255,.7)"/>
      <rect x="9" y="12" width="10" height="4" fill="rgba(100,180,255,.4)"/>
      <rect x="7" y="16" width="14" height="4" fill="rgba(60,130,220,.4)"/>
      <rect x="5" y="20" width="18" height="4" fill="rgba(20,80,180,.5)"/>
      <rect x="3" y="24" width="22" height="3" fill="rgba(10,40,120,.6)" rx="1"/>
    </svg>
    Iceberg
  </div>
  <div class="title-area">
    <input type="text" id="chart-title" value="My Iceberg" placeholder="Iceberg title..." spellcheck="false">
  </div>
  <div class="header-actions">
    <button class="btn" id="save-btn">Save JSON</button>
    <button class="btn" id="load-btn">Load JSON</button>
    <button class="btn primary" id="export-btn">Export PNG</button>
  </div>
  <input type="file" id="file-input" accept=".json,application/json">
</header>

<main class="layout">
  <aside class="sidebar">
    <h3>Unplaced Items</h3>
    <div class="unplaced-pool" id="unplaced-pool"></div>

    <div class="controls-panel">
      <h3>Display</h3>
      <label for="entry-size">Entry text size</label>
      <div class="slider-row">
        <input type="range" id="entry-size" min="10" max="24" step="1" value="14">
        <span id="entry-size-value">14px</span>
      </div>
    </div>

    <div class="add-item-row">
      <h3>Add Item</h3>
      <input type="text" id="new-item-name" placeholder="Item name..." maxlength="80">
      <textarea id="new-item-desc" placeholder="Description (optional) shown on hover/click..."></textarea>
      <button class="btn primary" id="add-item-btn">Add Item</button>
    </div>
  </aside>

  <section class="iceberg-area">
    <div class="iceberg-wrapper" id="iceberg-wrapper">
      <div class="tiers-container" id="tiers-container"></div>
    </div>
  </section>
</main>

<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <button class="modal-close" id="modal-close" aria-label="Close">&#x2715;</button>
    <div id="modal-view-mode">
      <h2 id="modal-title"></h2>
      <span class="tier-badge" id="modal-tier"></span>
      <div id="modal-desc-text"></div>
      <div class="modal-actions">
        <button class="btn" id="edit-btn">Edit</button>
        <button class="btn remove" id="modal-remove-delete-btn">Remove</button>
      </div>
    </div>
    <div id="modal-edit-mode" hidden>
      <div class="modal-edit-area">
        <input type="text" id="modal-edit-name" placeholder="Item name..." maxlength="80">
        <textarea id="modal-edit-desc" placeholder="Description..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn" id="cancel-edit-btn">Cancel</button>
        <button class="btn danger" id="delete-edit-btn">Delete</button>
        <button class="btn primary" id="save-edit-btn">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
const TIER_BOUNDARIES = [0, 195, 391, 621.5, 827.5, 1037.5, 1224.5, 1425.5, 1626.5, 1843.5, 2048];
const DEFAULT_TIERS = [
  ['Sky', '#13a9e8'],
  ['Surface', '#0051ff'],
  ['Shallow', '#0531e7'],
  ['Depths', '#0611b8'],
  ['Deep', '#04007c'],
  ['Abyss', '#02004d'],
  ['Lower Abyss', '#01002d'],
  ['Hadopelagic', '#000019'],
  ['Void', '#00000d'],
  ['Blackout', '#000000'],
];
const FIXED_TIER_COUNT = DEFAULT_TIERS.length;

let state = {
  title: 'My Iceberg',
  entryFontSize: 14,
  tiers: DEFAULT_TIERS.map(([label, color]) => ({ id: uid(), label, color })),
  items: []
};

let currentItemId = null;
let dragItemId = null;
let dragOffsetX = 0;
let dragOffsetY = 0;

const $ = id => document.getElementById(id);
const els = {
  title: $('chart-title'), file: $('file-input'), pool: $('unplaced-pool'), tiers: $('tiers-container'), wrapper: $('iceberg-wrapper'),
  entrySize: $('entry-size'), entrySizeValue: $('entry-size-value'), newName: $('new-item-name'), newDesc: $('new-item-desc'),
  modal: $('modal-overlay'), viewMode: $('modal-view-mode'), editMode: $('modal-edit-mode'), modalTitle: $('modal-title'), modalTier: $('modal-tier'), modalDesc: $('modal-desc-text'),
  modalEditName: $('modal-edit-name'), modalEditDesc: $('modal-edit-desc'), removeDelete: $('modal-remove-delete-btn')
};

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function clamp(num, min, max) {
  return Math.min(Math.max(num, min), max);
}

function tierGridTemplate() {
  const total = TIER_BOUNDARIES[TIER_BOUNDARIES.length - 1];
  return TIER_BOUNDARIES.slice(1).map((boundary, i) => `${((boundary - TIER_BOUNDARIES[i]) / total * 100).toFixed(4)}fr`).join(' ');
}

function normalizeState() {
  const oldTiers = Array.isArray(state.tiers) ? state.tiers : [];
  const oldTierIds = new Set(oldTiers.map(t => t.id));
  state.title = typeof state.title === 'string' ? state.title : 'My Iceberg';
  state.entryFontSize = clamp(Number(state.entryFontSize) || 14, 10, 24);
  state.tiers = DEFAULT_TIERS.map(([label, color], i) => ({
    id: oldTiers[i]?.id || uid(),
    label: oldTiers[i]?.label || label,
    color: oldTiers[i]?.color || color
  }));
  const validTierIds = new Set(state.tiers.map(t => t.id));
  state.items = Array.isArray(state.items) ? state.items : [];
  state.items.forEach(item => {
    item.name = String(item.name || '').trim() || 'Untitled';
    item.description = String(item.description || '');
    if (item.tierId && (!oldTierIds.has(item.tierId) || !validTierIds.has(item.tierId))) {
      item.tierId = null;
      delete item.xPct;
      delete item.yPct;
    }
  });
}

function applyEntrySize() {
  document.documentElement.style.setProperty('--entry-size', `${state.entryFontSize}px`);
  els.entrySize.value = state.entryFontSize;
  els.entrySizeValue.textContent = `${state.entryFontSize}px`;
}

function render() {
  normalizeState();
  els.title.value = state.title;
  applyEntrySize();
  renderTiers();
  renderPool();
}

function renderTiers() {
  const fragment = document.createDocumentFragment();
  els.tiers.innerHTML = '';
  els.tiers.style.gridTemplateRows = tierGridTemplate();

  state.tiers.forEach((tier, index) => {
    const row = document.createElement('div');
    row.className = 'tier-row';
    row.dataset.tierId = tier.id;

    const itemsCell = document.createElement('div');
    itemsCell.className = 'tier-items-cell';
    itemsCell.dataset.tierId = tier.id;

    state.items.filter(item => item.tierId === tier.id).forEach((item, itemIndex) => {
      itemsCell.appendChild(makeChip(item, itemIndex));
    });

    const labelCell = document.createElement('div');
    labelCell.className = 'tier-label-cell';

    const labelInput = document.createElement('input');
    labelInput.className = 'tier-label-input';
    labelInput.value = tier.label;
    labelInput.spellcheck = false;
    labelInput.dataset.tierIndex = index;
    labelCell.appendChild(labelInput);

    row.append(itemsCell, labelCell);
    fragment.appendChild(row);
  });

  els.tiers.appendChild(fragment);
}

function renderPool() {
  const fragment = document.createDocumentFragment();
  els.pool.innerHTML = '';
  state.items.filter(item => !item.tierId).forEach(item => fragment.appendChild(makeChip(item)));
  els.pool.appendChild(fragment);
}

function makeChip(item, itemIndex = 0) {
  const chip = document.createElement('div');
  chip.className = 'item-chip';
  chip.draggable = true;
  chip.dataset.itemId = item.id;

  if (item.tierId) {
    const defaultX = 2 + (itemIndex % 4) * 23;
    const defaultY = 8 + Math.floor(itemIndex / 4) * 16;
    chip.style.left = `${item.xPct ?? defaultX}%`;
    chip.style.top = `${item.yPct ?? defaultY}%`;
  }

  const text = document.createElement('span');
  text.className = 'item-chip-text';
  text.textContent = item.name;
  chip.appendChild(text);
  return chip;
}

function addItem() {
  const name = els.newName.value.trim();
  if (!name) {
    els.newName.focus();
    return;
  }
  state.items.push({ id: uid(), name, description: els.newDesc.value.trim(), tierId: null });
  els.newName.value = '';
  els.newDesc.value = '';
  els.newName.focus();
  renderPool();
}

function removeItemToPool(item) {
  if (item.tierId) {
    const tier = state.tiers.find(t => t.id === item.tierId);
    item.lastTierId = item.tierId;
    item.lastTierLabel = tier?.label || '';
  }
  item.tierId = null;
  delete item.xPct;
  delete item.yPct;
}

function deleteItem(id) {
  state.items = state.items.filter(item => item.id !== id);
  render();
}

function setDragItemFromEvent(e) {
  const chip = e.target.closest('.item-chip');
  if (!chip) return null;
  dragItemId = chip.dataset.itemId;
  const rect = chip.getBoundingClientRect();
  dragOffsetX = e.clientX - rect.left;
  dragOffsetY = e.clientY - rect.top;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragItemId);
  e.dataTransfer.setDragImage?.(chip, dragOffsetX, dragOffsetY);
  setTimeout(() => chip.classList.add('dragging'), 0);
  return chip;
}

function dropOnTier(e, tierId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragItemId) return;

  const item = state.items.find(i => i.id === dragItemId);
  if (!item) return;

  const cell = e.currentTarget;
  const rect = cell.getBoundingClientRect();
  const chip = document.querySelector(`.item-chip[data-item-id="${CSS.escape(dragItemId)}"]`);
  const chipWidth = chip?.offsetWidth || 120;
  const chipHeight = chip?.offsetHeight || 28;
  const x = clamp(e.clientX - rect.left - dragOffsetX, 0, Math.max(0, rect.width - chipWidth));
  const y = clamp(e.clientY - rect.top - dragOffsetY, 0, Math.max(0, rect.height - chipHeight));

  item.tierId = tierId;
  const tier = state.tiers.find(t => t.id === tierId);
  item.lastTierId = tierId;
  item.lastTierLabel = tier?.label || '';
  item.xPct = rect.width ? x / rect.width * 100 : 0;
  item.yPct = rect.height ? y / rect.height * 100 : 0;

  dragItemId = null;
  render();
}

function dropOnPool(e) {
  e.preventDefault();
  els.pool.classList.remove('drag-over');
  if (!dragItemId) return;
  const item = state.items.find(i => i.id === dragItemId);
  if (item) removeItemToPool(item);
  dragItemId = null;
  render();
}

function openModal(itemId) {
  currentItemId = itemId;
  const item = state.items.find(i => i.id === itemId);
  if (!item) return;

  const tier = state.tiers.find(t => t.id === item.tierId);
  const lastTier = item.lastTierId ? state.tiers.find(t => t.id === item.lastTierId) : null;
  const lastTierLabel = lastTier?.label || item.lastTierLabel;

  els.modalTitle.textContent = item.name;
  els.modalTier.textContent = tier ? `Tier: ${tier.label}` : (lastTierLabel ? `Last tier: ${lastTierLabel}` : 'Unplaced');
  els.removeDelete.textContent = item.tierId ? 'Remove' : 'Delete';
  els.removeDelete.className = item.tierId ? 'btn remove' : 'btn danger';

  els.modalDesc.innerHTML = '';
  const p = document.createElement('p');
  p.className = item.description ? 'desc-text' : 'no-desc';
  p.textContent = item.description || 'No description yet. Click Edit to add one.';
  els.modalDesc.appendChild(p);

  els.viewMode.hidden = false;
  els.editMode.hidden = true;
  els.modal.classList.remove('hidden');
}

function closeModal() {
  els.modal.classList.add('hidden');
  currentItemId = null;
}

function switchToEdit() {
  const item = state.items.find(i => i.id === currentItemId);
  if (!item) return;
  els.modalEditName.value = item.name;
  els.modalEditDesc.value = item.description || '';
  els.viewMode.hidden = true;
  els.editMode.hidden = false;
}

function saveEdit() {
  const item = state.items.find(i => i.id === currentItemId);
  const name = els.modalEditName.value.trim();
  if (!item || !name) return;
  item.name = name;
  item.description = els.modalEditDesc.value.trim();
  closeModal();
  render();
}

function removeOrDeleteCurrentItem() {
  const item = state.items.find(i => i.id === currentItemId);
  if (!item) return;
  if (item.tierId) {
    removeItemToPool(item);
    closeModal();
    render();
  } else {
    deleteItem(item.id);
    closeModal();
  }
}

function saveState() {
  state.title = els.title.value;
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${state.title || 'iceberg'}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadState(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const loaded = JSON.parse(e.target.result);
      if (!loaded || !Array.isArray(loaded.tiers) || !Array.isArray(loaded.items)) throw new Error('Bad state');
      state = loaded;
      normalizeState();
      render();
    } catch {
      alert('Invalid JSON file.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function exportImage() {
  state.title = els.title.value;
  const run = () => requestAnimationFrame(() => {
    html2canvas(els.wrapper, {
      backgroundColor: '#0a0e1a',
      scale: 2,
      useCORS: true,
      logging: false,
      windowWidth: els.wrapper.scrollWidth,
      windowHeight: els.wrapper.scrollHeight
    }).then(canvas => {
      const a = document.createElement('a');
      a.download = `${state.title || 'iceberg'}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    });
  });

  if (window.html2canvas) {
    run();
    return;
  }
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
  script.onload = run;
  document.head.appendChild(script);
}

els.title.addEventListener('input', e => { state.title = e.target.value; });
$('save-btn').addEventListener('click', saveState);
$('load-btn').addEventListener('click', () => els.file.click());
$('export-btn').addEventListener('click', exportImage);
els.file.addEventListener('change', loadState);
$('add-item-btn').addEventListener('click', addItem);
els.newName.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
els.entrySize.addEventListener('input', e => {
  state.entryFontSize = Number(e.target.value);
  applyEntrySize();
});

els.tiers.addEventListener('input', e => {
  if (!e.target.classList.contains('tier-label-input')) return;
  const tier = state.tiers[Number(e.target.dataset.tierIndex)];
  if (tier) tier.label = e.target.value;
});

document.addEventListener('dragstart', e => { setDragItemFromEvent(e); });
document.addEventListener('dragend', e => { e.target.closest('.item-chip')?.classList.remove('dragging'); });
document.addEventListener('click', e => {
  const chip = e.target.closest('.item-chip');
  if (chip) openModal(chip.dataset.itemId);
});

els.tiers.addEventListener('dragover', e => {
  const cell = e.target.closest('.tier-items-cell');
  if (!cell) return;
  e.preventDefault();
  cell.classList.add('drag-over');
});
els.tiers.addEventListener('dragleave', e => {
  const cell = e.target.closest('.tier-items-cell');
  if (cell && !cell.contains(e.relatedTarget)) cell.classList.remove('drag-over');
});
els.tiers.addEventListener('drop', e => {
  const cell = e.target.closest('.tier-items-cell');
  if (cell) dropOnTier(e, cell.dataset.tierId);
});
els.pool.addEventListener('dragover', e => { e.preventDefault(); els.pool.classList.add('drag-over'); });
els.pool.addEventListener('dragleave', () => els.pool.classList.remove('drag-over'));
els.pool.addEventListener('drop', dropOnPool);

els.modal.addEventListener('click', e => { if (e.target === els.modal) closeModal(); });
$('modal-close').addEventListener('click', closeModal);
$('edit-btn').addEventListener('click', switchToEdit);
$('cancel-edit-btn').addEventListener('click', () => { els.viewMode.hidden = false; els.editMode.hidden = true; });
$('save-edit-btn').addEventListener('click', saveEdit);
$('delete-edit-btn').addEventListener('click', () => { if (currentItemId) deleteItem(currentItemId); closeModal(); });
els.removeDelete.addEventListener('click', removeOrDeleteCurrentItem);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

render();
</script>
</body>
</html>
